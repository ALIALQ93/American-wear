# تحقق من أن المشروع يبنى بعد كل دفع أو طلب دمج — لا يستضيف الموقع للجمهور (راجع DEPLOY.md).
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
