# نشر الواجهة الثابتة إلى GitHub Pages (مسار المستودع تلقائياً).
# في إعدادات المستودع: Pages → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # يفشل مبكراً إن كانت الأسرار غير متاحة للبناء (بدونها تبقى صفحة الدخول تعرض تنبيه .env على Pages).
      - name: التحقق من أسرار Supabase للواجهة (بدون طباعة القيم)
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "::error::Secret VITE_SUPABASE_URL مفقود أو فارغ في Repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ] && [ -z "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" ]; then
            echo "::error::أضف VITE_SUPABASE_ANON_KEY أو VITE_SUPABASE_PUBLISHABLE_KEY في Repository secrets."
            exit 1
          fi
          echo "أسرار الواجهة: معرّفة — متابعة البناء"
      # يُحقَن في حزمة المتصفح وقت البناء — مطلوب لصفحة دخول الإدارة على Pages (بدونها يظهر تنبيه .env).
      # أضف في المستودع: Settings → Secrets and variables → Actions → New repository secret
      #   VITE_SUPABASE_URL = Project URL من Supabase → Settings → API
      #   وواحداً على الأقل: VITE_SUPABASE_ANON_KEY أو VITE_SUPABASE_PUBLISHABLE_KEY (نفس صفحة API)
      #   VITE_API_ORIGIN = عنوان خادم Node العام (بدون شرطة مائلة أخيرة)، مثال https://api-xxx.onrender.com
      #     — بدونها تبقى طلبات /api على github.io وتُرجع 404 لأن Pages لا تشغّل Express.
      - name: Build for GitHub Pages
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
