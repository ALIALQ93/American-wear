# نشر الواجهة الثابتة إلى GitHub Pages (مسار المستودع تلقائياً).
# في إعدادات المستودع: Pages → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # يُحقَن في حزمة المتصفح وقت البناء — مطلوب لصفحة دخول الإدارة على Pages (بدونها يظهر تنبيه .env).
      # أضف في المستودع: Settings → Secrets and variables → Actions → New repository secret
      #   VITE_SUPABASE_URL = Project URL من Supabase → Settings → API
      #   وواحداً على الأقل: VITE_SUPABASE_ANON_KEY أو VITE_SUPABASE_PUBLISHABLE_KEY (نفس صفحة API)
      - name: Build for GitHub Pages
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
