<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
<link rel="stylesheet" href="./src/styles/tailwind.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #131313; color: #e5e2e1; font-family: 'IBM Plex Sans Arabic', sans-serif; }
  .luxury-border { border: 1px solid rgba(230, 195, 100, 0.3); }
</style>
<title>American wear | حسابي</title>
</head>
<body class="overflow-x-hidden">
<nav class="fixed top-0 w-full z-50 bg-surface/85 backdrop-blur-md border-b border-primary/30 h-20">
<div class="flex flex-row-reverse justify-between items-center px-margin-desktop h-full max-w-container-max mx-auto">
<a class="text-headline-md font-headline-md text-primary tracking-widest uppercase" href="./home.html">American wear</a>
<a class="text-label-md text-on-surface-variant hover:text-primary" href="./home.html">الرئيسية</a>
</div>
</nav>
<main class="pt-28 pb-20 max-w-md mx-auto px-margin-desktop min-h-[60vh]">
<h1 class="text-headline-md font-headline-md text-primary mb-2 text-center">حساب الزبون</h1>
<p class="text-on-surface-variant text-label-sm text-center mb-4">التسجيل برقم الهاتف وكلمة المرور — بدون رسائل تأكيد</p>
<p id="auth-checkout-notice" class="hidden mb-6 text-center text-label-sm text-primary border border-primary/40 bg-primary/10 px-4 py-3 rounded">لإتمام الطلب يجب تسجيل الدخول أو إنشاء حساب جديد.</p>
<div class="flex border-b border-outline-variant mb-8">
<button type="button" id="auth-tab-login" class="flex-1 py-3 text-label-md border-b-2 border-primary text-primary">تسجيل الدخول</button>
<button type="button" id="auth-tab-register" class="flex-1 py-3 text-label-md border-b-2 border-transparent text-on-surface-variant">حساب جديد</button>
</div>
<div id="auth-login-panel">
<p id="auth-login-error" class="hidden mb-4 text-error text-label-sm text-center" role="alert"></p>
<form id="auth-login-form" class="space-y-4">
<div>
<label class="block text-label-sm text-on-surface-variant mb-1" for="auth-login-phone">رقم الهاتف</label>
<input id="auth-login-phone" required dir="ltr" type="tel" placeholder="07xxxxxxxx" class="w-full bg-surface-container border border-outline-variant px-3 py-2 text-left focus:border-primary outline-none"/>
</div>
<div>
<label class="block text-label-sm text-on-surface-variant mb-1" for="auth-login-password">كلمة المرور</label>
<input id="auth-login-password" required type="password" minlength="6" autocomplete="current-password" class="w-full bg-surface-container border border-outline-variant px-3 py-2 focus:border-primary outline-none"/>
</div>
<button type="submit" class="w-full bg-primary text-on-primary font-label-md py-3 hover:bg-primary-container">تسجيل الدخول</button>
</form>
<p class="text-center mt-4">
<button type="button" id="auth-forgot-toggle" class="text-label-sm text-primary hover:underline">نسيت كلمة المرور؟</button>
</p>
</div>
<div id="auth-forgot-panel" class="hidden">
<p id="auth-forgot-success" class="hidden mb-4 text-primary text-label-sm text-center border border-primary/30 bg-primary/10 px-3 py-2 rounded" role="status"></p>
<p id="auth-forgot-error" class="hidden mb-4 text-error text-label-sm text-center" role="alert"></p>
<p class="text-on-surface-variant text-label-sm mb-4 text-center">أدخل رقم هاتفك المسجّل. سيصل طلبك للإدارة وستُرسل كلمة المرور عبر واتساب — بدون رسائل SMS.</p>
<form id="auth-forgot-form" class="space-y-4">
<div>
<label class="block text-label-sm text-on-surface-variant mb-1" for="auth-forgot-phone">رقم الهاتف</label>
<input id="auth-forgot-phone" required dir="ltr" type="tel" placeholder="07xxxxxxxx" class="w-full bg-surface-container border border-outline-variant px-3 py-2 text-left focus:border-primary outline-none"/>
</div>
<button type="submit" class="w-full bg-primary text-on-primary font-label-md py-3 hover:bg-primary-container">إرسال الطلب للإدارة</button>
</form>
<p class="text-center mt-4">
<button type="button" id="auth-forgot-back" class="text-label-sm text-on-surface-variant hover:text-primary">العودة لتسجيل الدخول</button>
</p>
</div>
<div id="auth-register-panel" class="hidden">
<p id="auth-register-error" class="hidden mb-4 text-error text-label-sm text-center" role="alert"></p>
<form id="auth-register-form" class="space-y-4">
<div>
<label class="block text-label-sm text-on-surface-variant mb-1" for="auth-register-name">الاسم الكامل</label>
<input id="auth-register-name" required type="text" class="w-full bg-surface-container border border-outline-variant px-3 py-2 focus:border-primary outline-none"/>
</div>
<div>
<label class="block text-label-sm text-on-surface-variant mb-1" for="auth-register-phone">رقم الهاتف</label>
<input id="auth-register-phone" required dir="ltr" type="tel" placeholder="07xxxxxxxx" class="w-full bg-surface-container border border-outline-variant px-3 py-2 text-left focus:border-primary outline-none"/>
</div>
<div>
<label class="block text-label-sm text-on-surface-variant mb-1" for="auth-register-password">كلمة المرور</label>
<input id="auth-register-password" required type="password" minlength="6" autocomplete="new-password" class="w-full bg-surface-container border border-outline-variant px-3 py-2 focus:border-primary outline-none"/>
</div>
<div>
<label class="block text-label-sm text-on-surface-variant mb-1" for="auth-register-password2">تأكيد كلمة المرور</label>
<input id="auth-register-password2" required type="password" minlength="6" autocomplete="new-password" class="w-full bg-surface-container border border-outline-variant px-3 py-2 focus:border-primary outline-none"/>
</div>
<button type="submit" class="w-full bg-primary text-on-primary font-label-md py-3 hover:bg-primary-container">إنشاء حساب</button>
</form>
</div>
</main>
<script type="module" src="./src/js/accountAuthPage.js"></script>
</body>
</html>
